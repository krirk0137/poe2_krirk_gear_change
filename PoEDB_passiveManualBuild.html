<style>
:root {
    --magic-color: #8888ff;
    --highlight-color: gold;
    --weaponset1-color: red;
    --weaponset2-color: green;
}
#passive_skill_tree {
    width: 100vw;
    height: 100vh;
}
.custom-popover {
    --bs-popover-max-width: 600px;
    //--bs-popover-body-color: blue;
}
ul.masteryEffects {
    padding-left: 20;
    list-style-position: outside;
}
body {
    margin: 0;
    background: #222;
}
path.Druid1, line.Druid1 {
    stroke: lightblue;
}
circle.notable.Druid1 {
    stroke: lightblue;
}
circle.normal.Druid1 {
    fill: lightblue;
}
line.highlight, path.highlight, circle.highlight {
    stroke: var(--highlight-color);
}
circle.highlight {
    fill: var(--highlight-color);
}
line.weaponset1, path.weaponset1, circle.weaponset1 {
    stroke: var(--weaponset1-color);
}
circle.weaponset1 {
    fill: var(--weaponset1-color);
}
line.weaponset2, path.weaponset2, circle.weaponset2 {
    stroke: var(--weaponset2-color);
}
circle.weaponset2 {
    fill: var(--weaponset2-color);
}
circle.prevNew {
    stroke: purple !important;
    stroke-opacity: 0.9;
}
.border-new {
    border-color: purple !important;
}
circle.prevModify {
    stroke: chartreuse !important;
    stroke-opacity: 0.9;
}
.border-modify {
    border-color: chartreuse !important;
}
circle.filter {
    stroke: red;
    fill: red;
}
circle.mouseover {
    stroke: blue;
    fill: blue;
}
circle.highlight.filter {
    fill: green;
}
circle.inout {
    fill: green;
}
circle {
    stroke-width: 50;
    stroke-opacity: 0;
}
circle.notable {
    stroke-width: 10;
    stroke: orange;
    stroke-opacity: 1;
}
circle.keystone {
    stroke-width: 10;
    stroke: yellow;
    stroke-opacity: 1;
}
li.highlight {
    color: var(--highlight-color);
}
#funcPanel {
    position: fixed;
    top: 0px;
    right: 0px;
}
#statsPanel {
    background: #111;
    color: white;
    overflow-y: auto;
    max-height: 100vh;
}
#panelContent {
    width: 336px;
}
#statsRows div:nth-child(even) {
    background: linear-gradient(to right, rgba(18, 18, 18, 0) 0%, rgba(18, 18, 18, 255) 49%, rgba(18, 18, 18, 0) 100%);
    background-color: #222;
}
#statsRows div {
    font-size: 11pt;
    padding: 5px;
    border-top: 1px solid #9e9e9e;
}
.colourAugmented {
    color: var(--magic-color);
}
[aria-expanded="false"].fa-square-caret-up:before {
    content: "\f150"; // down
}
[aria-expanded="true"].fa-square-caret-up:before {
    content: "\f151"; // up
}
.unselectable {
    -moz-user-select: -moz-none;
    -khtml-user-select: none;
    -webkit-user-select: none;
    -o-user-select: none;
    user-select: none;
}
.collapsing {
    -webkit-transition: none;
    transition: none;
    display: none;
}
.item_description {
    color: #7f7f7f;
    font-style: italic;
}
.KeywordPopups {
    text-decoration: underline dotted;
    -webkit-text-decoration: underline dotted;
    text-underline-offset: 0.2em;
    color: inherit;
}
</style>

<div id="consent-box" style="display:none">
  <button onclick="window.__cmp('showModal');">
    Update cookie preferences
  </button>
</div>
<script>
  if (window["nitroAds"] && window["nitroAds"].loaded) {
    document.getElementById("consent-box").style.display = window["__tcfapi"]
      ? ""
      : "none";
  } else {
    document.addEventListener(
      "nitroAds.loaded",
      () =>
        (document.getElementById("consent-box").style.display = window["__tcfapi"]
          ? ""
          : "none")
    );
  }
</script>
